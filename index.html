n":"Supplier risk feeds your risk process, not a side track."},"no":{"it":"Il rischio fornitori è trattato a parte o ignorato.","en":"Supplier risk is handled separately or ignored."},"part":{"it":"Considerato all'onboarding ma non nel processo di rischio continuo.","en":"Considered at onboarding but not in the ongoing risk process."},"imp":{"it":"Il rischio fornitori è integrato in valutazione, ERM e miglioramento.","en":"Supplier risk is integrated into assessment, ERM and improvement."}},"gv_sc_04":{"intro":{"it":"Sapere chi sono i tuoi fornitori e quali contano di più.","en":"Know who your suppliers are and which matter most."},"no":{"it":"Nessun elenco fornitori.","en":"No supplier list."},"part":{"it":"Elenco fornitori senza valutazione di criticità.","en":"A supplier list with no criticality rating."},"imp":{"it":"Fornitori inventariati e classificati per criticità.","en":"Suppliers inventoried and ranked by criticality."}},"gv_sc_05":{"intro":{"it":"Mettere le richieste di sicurezza nero su bianco nei contratti.","en":"Put security requirements into contracts."},"no":{"it":"Nessuna clausola di sicurezza nei contratti.","en":"No security clauses in contracts."},"part":{"it":"Clausole solo con alcuni fornitori, non prioritizzate.","en":"Clauses only with some suppliers, not prioritised."},"imp":{"it":"Requisiti di sicurezza prioritizzati e inseriti nei contratti con i fornitori rilevanti.","en":"Prioritised security requirements written into contracts with relevant suppliers."}},"gv_sc_06":{"intro":{"it":"Controllare un fornitore PRIMA di firmare.","en":"Vet a supplier BEFORE signing."},"no":{"it":"Si firma senza alcuna verifica di sicurezza del fornitore.","en":"You sign with no security vetting of the supplier."},"part":{"it":"Verifica solo per i fornitori più grandi, informale.","en":"Vetting only for big suppliers, informal."},"imp":{"it":"Due diligence di sicurezza svolta prima di ogni rapporto rilevante.","en":"Security due diligence performed before each relevant relationship."}},"gv_sc_07":{"intro":{"it":"Tenere d'occhio i fornitori per tutta la durata del rapporto.","en":"Keep watching suppliers throughout the relationship."},"no":{"it":"Una volta firmato, il fornitore non viene più valutato.","en":"Once signed, the supplier is never re-assessed."},"part":{"it":"Rivalutazione solo se succede qualcosa.","en":"Re-assessment only when something goes wrong."},"imp":{"it":"Rischi dei fornitori registrati e monitorati durante tutto il rapporto.","en":"Supplier risks recorded and monitored throughout the relationship."}},"gv_sc_08":{"intro":{"it":"Sapere come coinvolgere i fornitori se l'incidente li tocca.","en":"Know how to involve suppliers if an incident touches them."},"no":{"it":"I fornitori non sono considerati nei piani di incidente.","en":"Suppliers aren't considered in incident plans."},"part":{"it":"Si sa chi chiamare ma niente di concordato o testato.","en":"You know who to call but nothing agreed or tested."},"imp":{"it":"Fornitori chiave inclusi in piani, contatti e prove di risposta agli incidenti.","en":"Key suppliers included in incident plans, contacts and drills."}},"gv_sc_09":{"intro":{"it":"La sicurezza di filiera vale dall'acquisto alla dismissione.","en":"Supply-chain security spans purchase to retirement."},"no":{"it":"Nessuna attenzione alla sicurezza lungo il ciclo di vita di prodotti/servizi terzi.","en":"No attention to security across the lifecycle of third-party products/services."},"part":{"it":"Sicurezza considerata solo all'acquisto.","en":"Security considered only at purchase."},"imp":{"it":"Pratiche di sicurezza integrate e monitorate per tutto il ciclo di vita.","en":"Security practices integrated and monitored across the whole lifecycle."}},"gv_sc_10":{"intro":{"it":"Pensare alla fine del rapporto: dati e accessi del fornitore.","en":"Plan for the end: the supplier's data and access."},"no":{"it":"Quando un fornitore esce, dati e accessi restano com'erano.","en":"When a supplier leaves, their data and access stay as they were."},"part":{"it":"Si revocano gli accessi ma senza gestire i dati.","en":"Access is revoked but data isn't handled."},"imp":{"it":"Piani di uscita: revoca accessi, restituzione/cancellazione dati, verifica.","en":"Wind-down plans: access revocation, data return/deletion, verification."}}};

let LANG='en';
const T=()=>I18N[LANG];
const L=o=>(o&&(o[LANG]||o.en))||'';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- state ---------- */
let FW='nis2';
let ANS={};
let OPEN=new Set();

/* ---------- helpers ---------- */
function dl(name,blob){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(u); },1500); }
function artify(s){ return s.replace(/Art(?:icle|\.)\s*(\d+)(?:\.\d+)?(\(\d+\))?(\([a-z]\))?/gi, m=>{ const n=(/(\d+)/.exec(m)||[])[1]; return `<span class="artref" data-art="${n}">${m}</span>`; }); }
function fhelp(text){ return `<div class="fldhelp">${artify(esc(text))}</div>`; }
function openPop(title,bodyHTML){ byId('popTitle').textContent=title; byId('popBody').innerHTML=bodyHTML; byId('popBg').classList.add('on'); }
function closePop(){ byId('popBg').classList.remove('on'); }
byId('popClose').onclick=closePop;
byId('popBg').onclick=e=>{ if(e.target===byId('popBg')) closePop(); };
document.addEventListener('click',e=>{ const r=e.target.closest?e.target.closest('.artref'):null; if(!r) return; const n=r.getAttribute('data-art'); const A=(ART[LANG]||ART.en)[n]; if(A) openPop(A.t,A.b); });

/* ---------- i18n apply ---------- */
function applyLang(){
 const t=T();
 byId('btnHow').textContent=t.how;
 const direct=['pv_eye','pv_h','pv_p','pvs1h','pvs1p','pvs2h','pvs2p','pvs3h','pvs3p','pv_cta','heroEyebrow','heroH1a','heroH1b','heroSub','heroCta1','heroCta2','b1eye','b1h','s1h','s2h','s3h','b2eye','b2h','b3eye','b3h','appEye','appH','lblFw','hdrH','lblOrg','lblAssessor','lblDate','scoreH','btnDemo','btnGuide','btnSave','btnLoad','btnCsv','btnPrint','btnReset','famlyH','famFirst','famFix','famMask','famScrub','famAsk','m_h1','m_h2','m_h3','m_h4','hoEyebrow','hoCta'];
 direct.forEach(k=>{ const e=byId(k); if(e) e.textContent=t[k]; });
 ['b1p','s1p','s2p','s3p','b2p','b3p','dataNote','footer','m_p1','m_p2','m_p3','m_p4','hoH','hoP'].forEach(id=>{ const e=byId(id); if(e) e.innerHTML=artify(t[id]); });
 populateFw(); renderCtrls(); updateToggleLabel();
}

/* ---------- lang / theme ---------- */
function setLang(l){ LANG=l; byId('lgEn').classList.toggle('on',l==='en'); byId('lgIt').classList.toggle('on',l==='it'); document.documentElement.lang=l; applyLang(); }
function setTheme(th){ document.documentElement.setAttribute('data-theme',th); byId('thDark').classList.toggle('on',th!=='light'); byId('thLight').classList.toggle('on',th==='light'); }
byId('lgEn').onclick=()=>setLang('en'); byId('lgIt').onclick=()=>setLang('it');
byId('thDark').onclick=()=>setTheme('dark'); byId('thLight').onclick=()=>setTheme('light');

/* ---------- hero dotfield + reveal ---------- */
(function(){ const df=byId('dotfield'); if(!df) return; let h=''; for(let i=0;i<46;i++){ const ac=Math.random()<0.12; h+=`<i class="${ac?'ac':''}" style="left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%"></i>`; } df.innerHTML=h; })();
const io=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); }),{threshold:.15});
['blk1','blk2','blkPriv','blk3'].forEach(id=>{ const el=byId(id); if(el) io.observe(el); });

/* ---------- modal ---------- */
function openModal(){ byId('modalBg').classList.add('on'); }
function closeModal(){ byId('modalBg').classList.remove('on'); }
byId('btnHow').onclick=openModal; byId('heroCta2').onclick=openModal; byId('mClose').onclick=closeModal;
byId('modalBg').onclick=e=>{ if(e.target===byId('modalBg')) closeModal(); };
byId('heroCta1').onclick=()=>byId('app').scrollIntoView({behavior:'smooth'});

/* ---------- framework selector ---------- */
function populateFw(){ const t=T(); byId('fwSel').innerHTML=Object.keys(FW_DATA).map(k=>{ const f=FW_DATA[k]; const nm=L(f.name)+(f.coming?` ${t.comingTag}`:''); return `<option value="${k}"${k===FW?' selected':''}>${esc(nm)}</option>`; }).join(''); }
byId('fwSel').onchange=e=>{ FW=e.target.value; OPEN.clear(); renderCtrls(); updateToggleLabel(); };

/* ---------- render controls ---------- */
function ctrlCard(c){
 const t=T(); const a=ANS[c.id]||{}; const st=a.status||'';
 const opts=['','imp','part','no','na'].map(v=>`<option value="${v}"${st===v?' selected':''}>${esc(t['st_'+(v||'none')])}</option>`).join('');
 return `<div class="ctrl" data-status="${st}">
   <div class="ch"><span class="ctrlref">${esc(c.ref)}</span><span class="ctrltitle">${esc(L(c.t))}</span></div>
   ${fhelp(L(c.d))}
   ${EX[c.id]?`<button class="exbtn" data-ex="${c.id}">${esc(t.examples)}</button>`:''}
   <select class="statussel" data-id="${c.id}">${opts}</select>
   <textarea data-id="${c.id}" data-f="note" placeholder="${esc(t.notePh)}">${esc(a.note||'')}</textarea>
 </div>`;
}
function areaPct(ar){ let sum=0,n=0; ar.controls.forEach(c=>{ const st=(ANS[c.id]||{}).status||''; if(st==='imp'){sum+=1;n++;} else if(st==='part'){sum+=0.5;n++;} else if(st==='no'){n++;} }); return n?Math.round(sum/n*100):null; }
function renderCtrls(){
 const t=T(); const fw=FW_DATA[FW]; const list=byId('ctrlList'); const sp=byId('scorePanel'); const tg=byId('btnToggleAll');
 if(fw.coming){ list.innerHTML=`<div class="coming">${esc(t.coming)}</div>`; sp.style.display='none'; if(tg)tg.style.display='none'; return; }
 sp.style.display=''; if(tg)tg.style.display='';
 list.innerHTML=fw.areas.map(ar=>{ const open=OPEN.has(ar.id); return `<div class="acc${open?' open':''}" data-area="${esc(ar.id)}"><button class="acc-h" data-acc="${esc(ar.id)}"><span class="chev">▸</span><span class="acc-t">${esc(L(ar.t))}</span><span class="acc-n">${ar.controls.length}</span></button><div class="acc-body">${ar.controls.map(ctrlCard).join('')}</div></div>`; }).join('');
 renderScore();
}
function updateToggleLabel(){ const tg=byId('btnToggleAll'); if(!tg)return; const fw=FW_DATA[FW]; const allOpen=fw&&!fw.coming&&fw.areas.length>0&&fw.areas.every(a=>OPEN.has(a.id)); tg.textContent=allOpen?T().collapseAll:T().expandAll; }
byId('btnToggleAll').onclick=()=>{ const fw=FW_DATA[FW]; if(fw.coming)return; const anyClosed=fw.areas.some(a=>!OPEN.has(a.id)); if(anyClosed) fw.areas.forEach(a=>OPEN.add(a.id)); else OPEN.clear(); renderCtrls(); updateToggleLabel(); };

/* ---------- scoring ---------- */
function renderScore(){
 const t=T(); const fw=FW_DATA[FW]; if(fw.coming) return;
 let imp=0,part=0,no=0,na=0,todo=0; const areas=[];
 fw.areas.forEach(ar=>{ let sum=0,n=0; ar.controls.forEach(c=>{ const st=(ANS[c.id]||{}).status||''; if(st==='imp'){imp++;sum+=1;n++;} else if(st==='part'){part++;sum+=0.5;n++;} else if(st==='no'){no++;n++;} else if(st==='na'){na++;} else {todo++;} }); areas.push({t:L(ar.t),pct:n?Math.round(sum/n*100):null}); });
 const assessed=imp+part+no; const total=imp+part+no+na+todo; const overall=assessed?Math.round((imp+part*0.5)/assessed*100):0;
 let html=`<div class="score-top"><div class="score-pct">${overall}%</div><div class="score-sub">${esc(t.sc_overall)}<br>${assessed}/${total} ${esc(t.sc_assessed)}</div></div>`;
 html+=`<div class="score-counts"><span><b>${imp}</b> ${esc(t.st_imp)}</span><span><b>${part}</b> ${esc(t.st_part)}</span><span><b>${no}</b> ${esc(t.st_no)}</span><span><b>${na}</b> ${esc(t.st_na)}</span><span><b>${todo}</b> ${esc(t.sc_todo)}</span></div>`;
 areas.forEach(a=>{ html+=`<div class="areabar"><div class="al"><span>${esc(a.t)}</span><span>${a.pct==null?'—':a.pct+'%'}</span></div><div class="bar"><i style="width:${a.pct==null?0:a.pct}%"></i></div></div>`; });
 byId('scoreBody').innerHTML=html;
}

/* ---------- control events ---------- */
const ctrlList=byId('ctrlList');
function openEx(id){ const e=EX[id]; if(!e) return; const t=T(); let ref='',title='';
 (FW_DATA[FW].coming?[]:FW_DATA[FW].areas).forEach(ar=>ar.controls.forEach(c=>{ if(c.id===id){ ref=c.ref; title=L(c.t); } }));
 const lvl=(cls,icon,lk,txt)=>`<div class="exlvl ${cls}"><div class="exk">${icon} ${esc(t[lk])}</div><p>${esc(L(txt))}</p></div>`;
 const body=`<p class="ex-intro">${esc(L(e.intro))}</p>`+lvl('exno','✗','st_no',e.no)+lvl('expart','◐','st_part',e.part)+lvl('eximp','✓','st_imp',e.imp);
 openPop(ref+' — '+title, body);
}
ctrlList.addEventListener('click',e=>{ const accH=e.target.closest?e.target.closest('.acc-h'):null; if(accH){ const id=accH.getAttribute('data-acc'); const acc=accH.closest('.acc'); const isOpen=acc.classList.toggle('open'); if(isOpen)OPEN.add(id);else OPEN.delete(id); updateToggleLabel(); return; } const b=e.target.closest?e.target.closest('.exbtn'):null; if(b) openEx(b.getAttribute('data-ex')); });
ctrlList.addEventListener('change',e=>{ const el=e.target; if(el.classList&&el.classList.contains('statussel')){ const id=el.dataset.id; (ANS[id]=ANS[id]||{}).status=el.value; const card=el.closest('.ctrl'); if(card) card.dataset.status=el.value; renderScore(); } });
ctrlList.addEventListener('input',e=>{ const el=e.target; if(el.dataset&&el.dataset.f==='note'){ const id=el.dataset.id; (ANS[id]=ANS[id]||{}).note=el.value; } });

/* ---------- guide toggle ---------- */
function setGuide(on){ document.documentElement.classList.toggle('helpon',on); byId('btnGuide').classList.toggle('on',on); }
byId('btnGuide').onclick=()=>setGuide(!document.documentElement.classList.contains('helpon'));

/* ---------- header ---------- */
const HDR=['fOrg','fAssessor','fDate'];
function readHeader(){ const o={}; HDR.forEach(id=>{ const e=byId(id); o[id]=e?e.value:''; }); return o; }
function writeHeader(o){ HDR.forEach(id=>{ const e=byId(id); if(e) e.value=(o&&o[id])||''; }); }

/* ---------- demo ---------- */
function loadDemo(lang){ if(FW!=='nis2'&&FW!=='nist'&&FW!=='iso27001'&&FW!=='gdpr') FW='nis2'; const src=(FW==='nist'?DEMO_NIST:(FW==='iso27001'?DEMO_ISO:(FW==='gdpr'?DEMO_GDPR:DEMO))); const d=src[lang]||src.en; populateFw(); writeHeader(d.header); ANS=JSON.parse(JSON.stringify(d.answers)); OPEN.clear(); renderCtrls(); updateToggleLabel(); byId('app').scrollIntoView({behavior:'smooth'}); }
byId('btnDemo').onclick=()=>{ openPop(T().demoChoose, `<div class="popbtns"><button id="demoIt">Italiano</button><button id="demoEn">English</button></div>`); byId('demoIt').onclick=()=>{ closePop(); loadDemo('it'); }; byId('demoEn').onclick=()=>{ closePop(); loadDemo('en'); }; };

/* ---------- save / load ---------- */
byId('btnSave').onclick=()=>{ const data={app:'GapFew',version:1,framework:FW,header:readHeader(),answers:ANS}; dl('gap-assessment.json', new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); };
byId('btnLoad').onclick=()=>byId('loadInput').click();
byId('loadInput').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
 r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.framework&&FW_DATA[d.framework]) FW=d.framework; writeHeader(d.header||{}); ANS=d.answers||{}; populateFw(); OPEN.clear(); renderCtrls(); updateToggleLabel(); }catch(err){ alert('Invalid file'); } byId('loadInput').value=''; };
 r.readAsText(f); });

/* ---------- reset ---------- */
byId('btnReset').onclick=()=>{ if(confirm(T().confirmReset)){ ANS={}; writeHeader({}); renderCtrls(); } };

/* ---------- export helpers ---------- */
function statusLabel(s){ const t=T(); return t['st_'+(s||'none')]; }
function prioOf(code){ const t=T();
 if(code==='no') return {w:1,label:t.p_high};
 if(code==='part') return {w:2,label:t.p_med};
 if(!code) return {w:3,label:t.sc_todo};
 if(code==='imp') return {w:4,label:''};
 if(code==='na') return {w:5,label:''};
 return {w:6,label:''}; }
function rows(){ const fw=FW_DATA[FW]; const out=[]; if(fw.coming) return out; fw.areas.forEach(ar=>{ ar.controls.forEach(c=>{ const a=ANS[c.id]||{}; const code=a.status||''; const p=prioOf(code); out.push({area:L(ar.t),ref:c.ref,ctrl:L(c.t),code:code,status:statusLabel(code),prio:p.label,pw:p.w,note:a.note||''}); }); }); out.sort((x,y)=>x.pw-y.pw); return out; }

/* ---------- CSV ---------- */
function csvCell(s){ s=String(s==null?'':s); return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
byId('btnCsv').onclick=()=>{ const t=T(); const h=readHeader(); const lines=[];
 lines.push([t.reportTitle+' — '+L(FW_DATA[FW].name)]); lines.push([t.lblOrg,h.fOrg]); lines.push([t.lblAssessor,h.fAssessor]); lines.push([t.lblDate,h.fDate]); lines.push([]);
 lines.push([t.c_area,t.c_ref,t.c_control,t.c_status,t.c_prio,t.c_note]);
 rows().forEach(r=>lines.push([r.area,r.ref,r.ctrl,r.status,r.prio,r.note]));
 const csv=lines.map(r=>r.map(csvCell).join(',')).join('\r\n');
 dl('gap-assessment.csv', new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
};

/* ---------- print / PDF ---------- */
byId('btnPrint').onclick=()=>{ const t=T(); const h=readHeader(); const fw=FW_DATA[FW];
 let imp=0,part=0,no=0,na=0,todo=0; (fw.coming?[]:fw.areas).forEach(ar=>ar.controls.forEach(c=>{ const st=(ANS[c.id]||{}).status||''; if(st==='imp')imp++;else if(st==='part')part++;else if(st==='no')no++;else if(st==='na')na++;else todo++; }));
 const assessed=imp+part+no; const overall=assessed?Math.round((imp+part*0.5)/assessed*100):0;
 const all=rows();
 const gaps=all.filter(r=>r.code==='no'||r.code==='part');
 const gapsHtml=gaps.length?`<h2>${esc(t.gaps_title)}</h2><table><thead><tr><th>${esc(t.c_prio)}</th><th>${esc(t.c_ref)}</th><th>${esc(t.c_control)}</th><th>${esc(t.c_status)}</th></tr></thead><tbody>${gaps.map(r=>`<tr><td>${esc(r.prio)}</td><td>${esc(r.ref)}</td><td>${esc(r.ctrl)}</td><td>${esc(r.status)}</td></tr>`).join('')}</tbody></table>`:'';
 const thead=`<tr><th>${esc(t.c_ref)}</th><th>${esc(t.c_control)}</th><th>${esc(t.c_status)}</th><th>${esc(t.c_prio)}</th><th>${esc(t.c_note)}</th></tr>`;
 const body=all.map(r=>`<tr><td>${esc(r.ref)}</td><td>${esc(r.ctrl)}</td><td>${esc(r.status)}</td><td>${esc(r.prio)}</td><td>${esc(r.note)}</td></tr>`).join('');
 byId('printView').innerHTML=`<h1>${esc(t.reportTitle)} — ${esc(L(fw.name))}</h1>
   <div class="pmeta">${esc(h.fOrg)} · ${esc(h.fAssessor)} · ${esc(h.fDate)}</div>
   <div class="ehdr"><b>${overall}% ${esc(t.sc_overall)}</b> — ${imp} ${esc(t.st_imp)}, ${part} ${esc(t.st_part)}, ${no} ${esc(t.st_no)}, ${na} ${esc(t.st_na)}, ${todo} ${esc(t.sc_todo)}</div>
   ${gapsHtml}
   <table><thead>${thead}</thead><tbody>${body}</tbody></table>`;
 window.print();
};

/* ---------- init ---------- */
setTheme('dark'); setLang('en'); setGuide(true);

</script>
</body>
</html>
