 exists but isn't approved by management or reviewed."},"imp":{"it":"Politica approvata dalla direzione, con obiettivi e indicatori, rivista almeno annualmente.","en":"Policy approved by management, with objectives and indicators, reviewed at least annually."}},"n_1_2":{"intro":{"it":"Sapere chi è responsabile di cosa nella sicurezza.","en":"Know who is responsible for what in security."},"no":{"it":"Nessuno ha responsabilità definite sulla sicurezza.","en":"No one has defined security responsibilities."},"part":{"it":"Responsabilità informali, nessuno riferisce alla direzione.","en":"Informal responsibilities, no one reports to management."},"imp":{"it":"Ruoli assegnati, referente che riporta alla direzione, compiti in conflitto separati.","en":"Roles assigned, a contact reporting to management, conflicting duties segregated."}},"n_2_1":{"intro":{"it":"Valutare i rischi in modo strutturato e trattarli.","en":"Assess risks in a structured way and treat them."},"no":{"it":"Nessuna valutazione del rischio.","en":"No risk assessment."},"part":{"it":"Valutazione una tantum, senza piano di trattamento né revisioni.","en":"A one-off assessment, with no treatment plan or reviews."},"imp":{"it":"Processo di risk management documentato, piano di trattamento e revisione almeno annuale.","en":"Documented risk-management process, treatment plan and at least annual review."}},"n_2_2":{"intro":{"it":"Controllare regolarmente se le politiche vengono davvero rispettate.","en":"Regularly check whether policies are actually followed."},"no":{"it":"Nessun controllo sul rispetto delle politiche.","en":"No checks on policy compliance."},"part":{"it":"Controlli sporadici, senza report alla direzione.","en":"Sporadic checks, with no reporting to management."},"imp":{"it":"Verifiche di conformità pianificate con reportistica alla direzione.","en":"Planned compliance reviews with reporting to management."}},"n_2_3":{"intro":{"it":"Far valutare la sicurezza da occhi indipendenti.","en":"Have security reviewed by independent eyes."},"no":{"it":"Nessun riesame indipendente.","en":"No independent review."},"part":{"it":"Riesami fatti dagli stessi responsabili dell'area (nessuna indipendenza).","en":"Reviews done by the same people who run the area (no independence)."},"imp":{"it":"Riesame indipendente periodico con risultati riportati alla direzione.","en":"Periodic independent review with results reported to management."}},"n_3_1":{"intro":{"it":"Avere una procedura scritta su cosa fare quando c'è un incidente.","en":"Have a written procedure for what to do when an incident happens."},"no":{"it":"Nessuna procedura di gestione incidenti.","en":"No incident-handling procedure."},"part":{"it":"Procedura generica, ruoli non assegnati, mai testata.","en":"A generic procedure, roles unassigned, never tested."},"imp":{"it":"Politica con ruoli, fasi e piani di comunicazione, testata periodicamente.","en":"Policy with roles, stages and communication plans, tested periodically."}},"n_3_2":{"intro":{"it":"Raccogliere e proteggere i log per accorgersi degli incidenti.","en":"Collect and protect logs to notice incidents."},"no":{"it":"Logging assente o disabilitato.","en":"Logging absent or disabled."},"part":{"it":"I sistemi loggano ma i log non sono protetti né revisionati.","en":"Systems log but logs aren't protected or reviewed."},"imp":{"it":"Logging centralizzato e protetto, con soglie d'allarme e revisione regolare.","en":"Centralised, protected logging with alarm thresholds and regular review."}},"n_3_3":{"intro":{"it":"Rendere facile segnalare qualcosa di sospetto.","en":"Make it easy to report something suspicious."},"no":{"it":"Nessun canale per segnalare eventi sospetti.","en":"No channel to report suspicious events."},"part":{"it":"Si può segnalare informalmente ma senza un canale chiaro.","en":"You can report informally but with no clear channel."},"imp":{"it":"Canale di segnalazione semplice e noto, con formazione del personale.","en":"A simple, well-known reporting channel, with staff training."}},"n_3_4":{"intro":{"it":"Distinguere i veri incidenti e dargli priorità.","en":"Tell real incidents apart and prioritise them."},"no":{"it":"Gli eventi non vengono valutati né classificati.","en":"Events aren't assessed or classified."},"part":{"it":"Valutazione a sensazione, senza criteri.","en":"Assessment by gut feel, with no criteria."},"imp":{"it":"Criteri predefiniti, triage e correlazione dei log per classificare gli eventi.","en":"Predefined criteria, triage and log correlation to classify events."}},"n_3_5":{"intro":{"it":"Reagire all'incidente in modo ordinato e tracciato.","en":"React to incidents in an orderly, traceable way."},"no":{"it":"Si improvvisa, senza procedure.","en":"You improvise, with no procedures."},"part":{"it":"Si reagisce ma senza contenimento/eradicazione strutturati né test.","en":"You react but without structured containment/eradication or testing."},"imp":{"it":"Procedure con contenimento, eradicazione, ripristino e comunicazioni, testate.","en":"Procedures with containment, eradication, recovery and communications, tested."}},"n_3_6":{"intro":{"it":"Imparare da ogni incidente.","en":"Learn from every incident."},"no":{"it":"Nessuna analisi dopo gli incidenti.","en":"No analysis after incidents."},"part":{"it":"Se ne parla ma senza causa radice né lezioni documentate.","en":"It's talked about but with no root cause or documented lessons."},"imp":{"it":"Riesame post-incidente con causa radice e lezioni apprese documentate.","en":"Post-incident review with documented root cause and lessons learned."}},"n_4_1":{"intro":{"it":"Sapere come continuare a operare dopo un disastro.","en":"Know how to keep operating after a disaster."},"no":{"it":"Nessun piano di continuità o disaster recovery.","en":"No continuity or disaster-recovery plan."},"part":{"it":"Piano abbozzato ma mai testato né basato su una BIA.","en":"A rough plan, never tested or based on a BIA."},"imp":{"it":"Piano BC/DR con BIA, obiettivi di ripristino, testato periodicamente.","en":"BC/DR plan with BIA, recovery objectives, tested periodically."}},"n_4_2":{"intro":{"it":"Avere backup provati e risorse ridondanti.","en":"Have tested backups and redundant resources."},"no":{"it":"Nessun backup, o mai testato.","en":"No backups, or never tested."},"part":{"it":"Backup presenti ma non protetti/distanti né testati.","en":"Backups exist but aren't protected/distant or tested."},"imp":{"it":"Backup protetti (offline/distante), con check d'integrità e ripristino testato.","en":"Protected backups (offline/distant), with integrity checks and tested restore."}},"n_4_3":{"intro":{"it":"Avere un piano per gestire una crisi grave.","en":"Have a plan to manage a serious crisis."},"no":{"it":"Nessun processo di gestione delle crisi.","en":"No crisis-management process."},"part":{"it":"Si gestisce all'occorrenza, senza ruoli o canali definiti.","en":"Handled ad hoc, with no defined roles or channels."},"imp":{"it":"Processo di crisi con ruoli, canali verso le autorità e test periodici.","en":"Crisis process with roles, channels to authorities and periodic tests."}},"n_5_1":{"intro":{"it":"Gestire il rischio che arriva dai fornitori.","en":"Manage the risk coming from suppliers."},"no":{"it":"Nessuna attenzione alla sicurezza dei fornitori.","en":"No attention to supplier security."},"part":{"it":"Si scelgono i fornitori senza criteri di sicurezza né clausole contrattuali.","en":"Suppliers chosen with no security criteria or contract clauses."},"imp":{"it":"Criteri di sicurezza nella selezione e clausole nei contratti, con revisione periodica.","en":"Security criteria in selection and clauses in contracts, with periodic review."}},"n_5_2":{"intro":{"it":"Sapere chi sono i tuoi fornitori e cosa ti forniscono.","en":"Know who your suppliers are and what they provide."},"no":{"it":"Nessun elenco dei fornitori.","en":"No supplier list."},"part":{"it":"Elenco parziale o non aggiornato.","en":"A partial or out-of-date list."},"imp":{"it":"Registro aggiornato con contatti e servizi/prodotti ICT per ciascun fornitore.","en":"Up-to-date registry with contacts and ICT services/products per supplier."}},"n_6_1":{"intro":{"it":"Comprare ICT in modo sicuro (requisiti, aggiornamenti).","en":"Buy ICT securely (requirements, updates)."},"no":{"it":"Si acquista ICT senza requisiti di sicurezza.","en":"ICT bought with no security requirements."},"part":{"it":"Qualche requisito informale, nessuna verifica.","en":"Some informal requirements, no verification."},"imp":{"it":"Requisiti di sicurezza definiti, aggiornamenti garantiti e conformità verificata.","en":"Defined security requirements, guaranteed updates and verified conformity."}},"n_6_2":{"intro":{"it":"Se sviluppi software, fallo in sicurezza (per chi sviluppa).","en":"If you build software, build it securely (for those who develop)."},"no":{"it":"Sviluppo senza pratiche di sicurezza.","en":"Development with no security practices."},"part":{"it":"Qualche controllo ma non in tutte le fasi.","en":"Some checks but not in every phase."},"imp":{"it":"Regole di secure development in tutte le fasi, con test di sicurezza.","en":"Secure-development rules across all phases, with security testing."}},"n_6_3":{"intro":{"it":"Configurazioni sicure e standard, non i default.","en":"Secure, standard configurations, not the defaults."},"no":{"it":"Sistemi con configurazioni di default.","en":"Systems left on default configs."},"part":{"it":"Hardening manuale senza baseline.","en":"Manual hardening with no baseline."},"imp":{"it":"Baseline sicure applicate e monitorate per sistemi e reti.","en":"Secure baselines applied and monitored for systems and networks."}},"n_6_4":{"intro":{"it":"Controllare le modifiche prima di metterle in produzione.","en":"Control changes before putting them into production."},"no":{"it":"Le modifiche si fanno senza controllo né test.","en":"Changes made with no control or testing."},"part":{"it":"Cambiamenti gestiti a voce, senza documentazione.","en":"Changes handled verbally, with no documentation."},"imp":{"it":"Change management documentato con test e valutazione d'impatto.","en":"Documented change management with testing and impact assessment."}},"n_6_5":{"intro":{"it":"Testare regolarmente la sicurezza (scan, pentest).","en":"Regularly test security (scans, pentests)."},"no":{"it":"Nessun test di sicurezza.","en":"No security testing."},"part":{"it":"Qualche scansione occasionale, senza metodo né follow-up.","en":"Some occasional scanning, with no method or follow-up."},"imp":{"it":"Test pianificati con metodologia e rimedio dei rilievi critici.","en":"Planned tests with a methodology and remediation of critical findings."}},"n_6_6":{"intro":{"it":"Applicare le patch in modo tempestivo e controllato.","en":"Apply patches promptly and in a controlled way."},"no":{"it":"Patch non applicate o a caso.","en":"Patches not applied or applied haphazardly."},"part":{"it":"Patch sui server ma non su tutto, senza tempi definiti.","en":"Servers patched but not everything, with no defined timelines."},"imp":{"it":"Patch management con tempi per gravità, test e fonti verificate.","en":"Patch management with timelines by severity, testing and verified sources."}},"n_6_7":{"intro":{"it":"Proteggere la rete da accessi e comunicazioni indesiderate.","en":"Protect the network from unwanted access and communications."},"no":{"it":"Rete senza protezioni (no firewall, accessi liberi).","en":"Network with no protection (no firewall, open access)."},"part":{"it":"Firewall perimetrale ma controlli interni e remoti deboli.","en":"A perimeter firewall but weak internal and remote controls."},"imp":{"it":"Architettura documentata, controlli su accessi interni/remoti e canali fidati.","en":"Documented architecture, controls on internal/remote access and trusted channels."}},"n_6_8":{"intro":{"it":"Dividere la rete in zone per limitare i danni.","en":"Split the network into zones to limit damage."},"no":{"it":"Rete piatta, tutto comunica con tutto.","en":"Flat network, everything talks to everything."},"part":{"it":"Qualche separazione (es. ospiti) ma produzione/test/admin insieme.","en":"Some separation (e.g. guests) but production/test/admin together."},"imp":{"it":"Zone segmentate per rischio, con produzione, test e admin separati.","en":"Zones segmented by risk, with production, test and admin separated."}},"n_6_9":{"intro":{"it":"Bloccare malware e software non autorizzato.","en":"Block malware and unauthorised software."},"no":{"it":"Nessuna protezione antimalware.","en":"No anti-malware protection."},"part":{"it":"Antivirus presente ma non gestito/aggiornato ovunque.","en":"Antivirus present but not managed/updated everywhere."},"imp":{"it":"Detection & response aggiornati e controllo del software non autorizzato.","en":"Up-to-date detection & response and control of unauthorised software."}},"n_6_10":{"intro":{"it":"Conoscere e correggere le vulnerabilità.","en":"Know and fix your vulnerabilities."},"no":{"it":"Nessuna gestione delle vulnerabilità.","en":"No vulnerability management."},"part":{"it":"Si scopre per caso, rimedio lento e non tracciato.","en":"Found by chance, remediation slow and untracked."},"imp":{"it":"Monitoraggio fonti, scansioni e rimedio tempestivo delle vulnerabilità critiche.","en":"Source monitoring, scanning and timely remediation of critical vulnerabilities."}},"n_7":{"intro":{"it":"Misurare se le misure funzionano davvero.","en":"Measure whether the measures actually work."},"no":{"it":"Non si verifica mai se le misure funzionano.","en":"You never check whether the measures work."},"part":{"it":"Qualche controllo informale, senza metodo né responsabili.","en":"Some informal checks, with no method or owners."},"imp":{"it":"Politica con metriche, responsabili e tempi per valutare l'efficacia.","en":"Policy with metrics, owners and timelines to assess effectiveness."}},"n_8_1":{"intro":{"it":"Tutti conoscono le basi e le buone pratiche.","en":"Everyone knows the basics and good practices."},"no":{"it":"Nessuna sensibilizzazione.","en":"No awareness activity."},"part":{"it":"Una tantum, senza ripetizione né verifica.","en":"One-off, with no repetition or checking."},"imp":{"it":"Programma ricorrente con verifica di efficacia.","en":"A recurring programme with effectiveness checks."}},"n_8_2":{"intro":{"it":"Chi ha ruoli tecnici riceve formazione mirata.","en":"Those in technical roles get targeted training."},"no":{"it":"Nessuna formazione tecnica di sicurezza.","en":"No technical security training."},"part":{"it":"Formazione occasionale, non per ruolo.","en":"Occasional training, not role-based."},"imp":{"it":"Formazione per ruolo, periodica e con efficacia valutata.","en":"Role-based training, periodic and with effectiveness assessed."}},"n_9":{"intro":{"it":"Usare la crittografia in modo coerente e gestire le chiavi.","en":"Use cryptography consistently and manage the keys."},"no":{"it":"Nessun uso strutturato della crittografia.","en":"No structured use of cryptography."},"part":{"it":"Cifratura su alcuni dati ma senza politica né gestione delle chiavi.","en":"Encryption on some data but no policy or key management."},"imp":{"it":"Politica crittografica e gestione delle chiavi per dati a riposo e in transito.","en":"A cryptography policy and key management for data at rest and in transit."}},"n_10_1":{"intro":{"it":"Le persone capiscono e rispettano le loro responsabilità di sicurezza.","en":"People understand and meet their security responsibilities."},"no":{"it":"Nessuna responsabilità di sicurezza assegnata al personale.","en":"No security responsibilities assigned to staff."},"part":{"it":"Responsabilità implicite, non comunicate.","en":"Implicit responsibilities, not communicated."},"imp":{"it":"Responsabilità comprese e impegno formale di dipendenti e fornitori.","en":"Responsibilities understood and formal commitment from staff and suppliers."}},"n_10_2":{"intro":{"it":"Controllare i precedenti per i ruoli sensibili.","en":"Check backgrounds for sensitive roles."},"no":{"it":"Nessuna verifica dei precedenti.","en":"No background checks."},"part":{"it":"Verifica saltuaria, senza criteri.","en":"Occasional checks, with no criteria."},"imp":{"it":"Criteri definiti e verifica prima dell'assegnazione dei ruoli sensibili.","en":"Defined criteria and verification before assigning sensitive roles."}},"n_10_3":{"intro":{"it":"Gestire la sicurezza quando qualcuno cambia ruolo o se ne va.","en":"Manage security when someone changes role or leaves."},"no":{"it":"Nessuna gestione di accessi/obblighi alla cessazione.","en":"No handling of access/obligations on termination."},"part":{"it":"Si revoca qualcosa ma senza obblighi contrattuali post-impiego.","en":"Something is revoked but with no post-employment contractual obligations."},"imp":{"it":"Obblighi post-impiego (riservatezza) contrattuali e applicati.","en":"Post-employment obligations (confidentiality) contractual and enforced."}},"n_10_4":{"intro":{"it":"Avere conseguenze chiare per chi viola le regole di sicurezza.","en":"Have clear consequences for breaking security rules."},"no":{"it":"Nessun processo disciplinare per le violazioni.","en":"No disciplinary process for breaches."},"part":{"it":"Esiste un processo generico ma non copre la sicurezza.","en":"A generic process exists but doesn't cover security."},"imp":{"it":"Processo disciplinare per le violazioni di sicurezza, comunicato.","en":"A disciplinary process for security breaches, communicated."}},"n_11_1":{"intro":{"it":"Avere regole chiare su chi accede a cosa.","en":"Have clear rules on who accesses what."},"no":{"it":"Nessuna politica di controllo accessi.","en":"No access-control policy."},"part":{"it":"Accessi gestiti caso per caso, senza politica.","en":"Access handled case by case, with no policy."},"imp":{"it":"Politiche di accesso logico e fisico documentate e applicate.","en":"Logical and physical access policies documented and applied."}},"n_11_2":{"intro":{"it":"Dare gli accessi giusti e rivederli.","en":"Grant the right access and review it."},"no":{"it":"Accessi mai rivisti; ex dipendenti ancora attivi.","en":"Access never reviewed; ex-employees still active."},"part":{"it":"Accessi per ruolo ma senza revisioni periodiche.","en":"Role-based access but no periodic reviews."},"imp":{"it":"Privilegio minimo, registro degli accessi e revisioni periodiche.","en":"Least privilege, an access register and periodic reviews."}},"n_11_3":{"intro":{"it":"Proteggere gli account potenti (admin).","en":"Protect the powerful (admin) accounts."},"no":{"it":"Admin condivisi, senza MFA.","en":"Shared admin accounts, no MFA."},"part":{"it":"Account admin nominali ma senza MFA o uso promiscuo.","en":"Named admin accounts but no MFA or used promiscuously."},"imp":{"it":"Account admin dedicati, con MFA e privilegi minimi.","en":"Dedicated admin accounts, with MFA and minimal privileges."}},"n_11_4":{"intro":{"it":"Usare postazioni/sistemi dedicati per l'amministrazione.","en":"Use dedicated stations/systems for administration."},"no":{"it":"Si amministra da postazioni qualsiasi.","en":"Administration done from any workstation."},"part":{"it":"Qualche separazione ma non sistematica.","en":"Some separation but not systematic."},"imp":{"it":"Sistemi di amministrazione dedicati, separati e protetti.","en":"Dedicated administration systems, separated and protected."}},"n_11_5":{"intro":{"it":"Ogni identità è unica e riconducibile a una persona.","en":"Each identity is unique and tied to one person."},"no":{"it":"Account condivisi e identità non gestite.","en":"Shared accounts and unmanaged identities."},"part":{"it":"Identità per utente ma condivisi tollerati senza controllo.","en":"Per-user identities but shared ones tolerated without control."},"imp":{"it":"Identità uniche, ciclo di vita gestito, condivise solo se approvate.","en":"Unique identities, managed lifecycle, shared only if approved."}},"n_11_6":{"intro":{"it":"Autenticazione robusta e ben gestita.","en":"Robust, well-managed authentication."},"no":{"it":"Password deboli, mai cambiate, nessun blocco.","en":"Weak passwords, never changed, no lockout."},"part":{"it":"Password ok ma nessun blocco o timeout di sessione.","en":"Passwords ok but no lockout or session timeout."},"imp":{"it":"Forza adeguata, blocco tentativi e chiusura sessioni inattive.","en":"Adequate strength, attempt lockout and inactive-session timeout."}},"n_11_7":{"intro":{"it":"MFA dove serve.","en":"MFA where it matters."},"no":{"it":"Nessuna MFA.","en":"No MFA."},"part":{"it":"MFA solo su alcuni servizi.","en":"MFA only on some services."},"imp":{"it":"MFA su accessi critici e remoti, proporzionata al rischio.","en":"MFA on critical and remote access, proportionate to risk."}},"n_12_1":{"intro":{"it":"Classificare gli asset per sapere quanto proteggerli.","en":"Classify assets to know how much to protect them."},"no":{"it":"Nessuna classificazione degli asset.","en":"No asset classification."},"part":{"it":"Classificazione informale o parziale.","en":"Informal or partial classification."},"imp":{"it":"Sistema di classificazione applicato a tutti gli asset, rivisto.","en":"A classification system applied to all assets, reviewed."}},"n_12_2":{"intro":{"it":"Maneggiare gli asset in sicurezza per tutta la loro vita.","en":"Handle assets securely throughout their life."},"no":{"it":"Nessuna regola sul trattamento degli asset.","en":"No rules on asset handling."},"part":{"it":"Regole parziali, niente su distruzione/trasporto sicuri.","en":"Partial rules, nothing on safe destruction/transport."},"imp":{"it":"Politica sull'intero ciclo di vita, inclusa distruzione sicura.","en":"A policy over the whole lifecycle, including secure destruction."}},"n_12_3":{"intro":{"it":"Gestire chiavette e supporti rimovibili.","en":"Manage USB sticks and removable media."},"no":{"it":"Chiavette usate liberamente.","en":"USB sticks used freely."},"part":{"it":"Si scoraggia ma senza controlli tecnici.","en":"Discouraged but with no technical controls."},"imp":{"it":"Uso limitato, autoesecuzione bloccata, scansione e cifratura.","en":"Limited use, auto-run blocked, scanning and encryption."}},"n_12_4":{"intro":{"it":"Sapere cosa hai (inventario aggiornato).","en":"Know what you have (an up-to-date inventory)."},"no":{"it":"Nessun inventario degli asset.","en":"No asset inventory."},"part":{"it":"Inventario parziale o non aggiornato.","en":"A partial or out-of-date inventory."},"imp":{"it":"Inventario completo e aggiornato con storico delle modifiche.","en":"A complete, up-to-date inventory with change history."}},"n_12_5":{"intro":{"it":"Recuperare gli asset quando una persona se ne va.","en":"Recover assets when a person leaves."},"no":{"it":"Asset e accessi restano alla persona dopo l'uscita.","en":"Assets and access stay with the person after they leave."},"part":{"it":"Si recupera l'hardware ma non si revocano gli accessi.","en":"Hardware is recovered but access isn't revoked."},"imp":{"it":"Deposito/restituzione/cancellazione documentati alla cessazione.","en":"Deposit/return/deletion documented on termination."}},"n_13_1":{"intro":{"it":"Proteggere i sistemi da blackout e guasti delle utenze.","en":"Protect systems from blackouts and utility failures."},"no":{"it":"Nessuna protezione (no UPS, nessun monitoraggio).","en":"No protection (no UPS, no monitoring)."},"part":{"it":"UPS presente ma niente ridondanza o monitoraggio.","en":"A UPS present but no redundancy or monitoring."},"imp":{"it":"Protezioni e ridondanze su elettricità/clima, monitorate e testate.","en":"Protection and redundancy on power/cooling, monitored and tested."}},"n_13_2":{"intro":{"it":"Proteggere i locali da incendio, acqua, calore.","en":"Protect premises from fire, water, heat."},"no":{"it":"Nessuna protezione ambientale dei locali.","en":"No environmental protection of premises."},"part":{"it":"Qualche misura (estintore) senza monitoraggio dei parametri.","en":"Some measures (a fire extinguisher) without parameter monitoring."},"imp":{"it":"Protezioni con soglie e monitoraggio (temperatura, umidità, fumo).","en":"Protections with thresholds and monitoring (temperature, humidity, smoke)."}},"n_13_3":{"intro":{"it":"Controllare chi entra fisicamente dove ci sono i sistemi.","en":"Control who physically enters where systems live."},"no":{"it":"Locali tecnici accessibili a chiunque.","en":"Technical rooms accessible to anyone."},"part":{"it":"Porta chiusa ma nessun controllo o registro accessi.","en":"A locked door but no access control or log."},"imp":{"it":"Perimetri, controlli agli ingressi e monitoraggio continuo.","en":"Security perimeters, entry controls and continuous monitoring."}},"de_cm_01":{"intro":{"it":"Sorvegliare il traffico di rete per cogliere anomalie.","en":"Watch network traffic to catch anomalies."},"no":{"it":"Nessun monitoraggio della rete.","en":"No network monitoring."},"part":{"it":"Si guardano i log del firewall solo dopo un problema.","en":"Firewall logs are checked only after a problem."},"imp":{"it":"Monitoraggio continuo del traffico (IDS/NDR, baseline) con alerting.","en":"Continuous traffic monitoring (IDS/NDR, baselines) with alerting."}},"de_cm_02":{"intro":{"it":"Sorvegliare i locali fisici (accessi, videosorveglianza).","en":"Monitor physical premises (access, CCTV)."},"no":{"it":"Nessun monitoraggio fisico dei locali tecnici.","en":"No physical monitoring of technical premises."},"part":{"it":"Telecamere presenti ma nessuno controlla né allarmi.","en":"Cameras present but no one watches and no alarms."},"imp":{"it":"Monitoraggio fisico (allarmi, videosorveglianza, accessi) con notifica.","en":"Physical monitoring (alarms, CCTV, access) with alerting."}},"de_cm_03":{"intro":{"it":"Notare comportamenti anomali degli utenti (login strani, accessi insoliti).","en":"Spot anomalous user behaviour (odd logins, unusual access)."},"no":{"it":"Nessun monitoraggio dell'attività degli utenti.","en":"No monitoring of user activity."},"part":{"it":"Si raccolgono log di accesso ma non si analizzano.","en":"Access logs are collected but not analysed."},"imp":{"it":"Monitoraggio dell'attività (es. SIEM/UEBA) con alert su comportamenti anomali.","en":"Activity monitoring (e.g. SIEM/UEBA) with alerts on anomalous behaviour."}},"de_cm_06":{"intro":{"it":"Tenere d'occhio anche ciò che fanno i fornitori (cloud, MSP).","en":"Also watch what providers do (cloud, MSP)."},"no":{"it":"Nessun monitoraggio delle attività dei fornitori.","en":"No monitoring of provider activity."},"part":{"it":"Ci si fida del fornitore senza verificare log o avvisi.","en":"You trust the provider without checking logs or alerts."},"imp":{"it":"Monitoraggio di accessi e attività dei fornitori (log, avvisi, SLA di sicurezza).","en":"Monitoring of provider access and activity (logs, alerts, security SLAs)."}},"de_cm_09":{"intro":{"it":"Sorvegliare endpoint e server (EDR, integrità).","en":"Watch endpoints and servers (EDR, integrity)."},"no":{"it":"Nessun monitoraggio di endpoint e server (no antivirus/EDR).","en":"No endpoint/server monitoring (no antivirus/EDR)."},"part":{"it":"Antivirus presente ma nessuna gestione centralizzata degli alert.","en":"Antivirus present but no centralised alert management."},"imp":{"it":"EDR/monitoraggio su endpoint e server con alert gestiti centralmente.","en":"EDR/monitoring on endpoints and servers with centrally managed alerts."}},"de_ae_02":{"intro":{"it":"Capire cosa significano gli eventi sospetti.","en":"Understand what suspicious events mean."},"no":{"it":"Gli eventi non vengono mai analizzati.","en":"Events are never analysed."},"part":{"it":"Si guardano gli alert ma senza approfondire.","en":"Alerts are glanced at but not investigated."},"imp":{"it":"Gli eventi sospetti sono analizzati per ricostruire le attività associate.","en":"Suspicious events are analysed to reconstruct associated activity."}},"de_ae_03":{"intro":{"it":"Mettere insieme segnali da fonti diverse (log, EDR, rete).","en":"Combine signals from different sources (logs, EDR, network)."},"no":{"it":"Ogni sistema è guardato a sé; nessuna correlazione.","en":"Each system viewed alone; no correlation."},"part":{"it":"Log raccolti in un punto ma correlazione manuale e rara.","en":"Logs in one place but correlation is manual and rare."},"imp":{"it":"Correlazione automatica da più fonti (es. SIEM) per vedere il quadro.","en":"Automated correlation from multiple sources (e.g. SIEM) for the full picture."}},"de_ae_04":{"intro":{"it":"Capire quanto è grave e fin dove arriva un evento.","en":"Understand how serious and how far-reaching an event is."},"no":{"it":"Non si valuta mai l'impatto o l'ambito di un evento.","en":"Impact and scope are never assessed."},"part":{"it":"Si stima l'impatto a sensazione, senza criteri.","en":"Impact is guessed, with no criteria."},"imp":{"it":"Impatto e ambito (sistemi, dati, utenti coinvolti) stimati con criteri.","en":"Impact and scope (systems, data, users affected) estimated with criteria."}},"de_ae_06":{"intro":{"it":"Far arrivare le info giuste a chi e a cosa deve agire.","en":"Get the right info to whoever/whatever must act."},"no":{"it":"Le rilevazioni restano in un sistema, nessuno viene avvisato.","en":"Detections sit in a system, no one is notified."},"part":{"it":"Avvisi via email casuali, senza destinatari definiti.","en":"Ad-hoc email alerts, with no defined recipients."},"imp":{"it":"Le info sugli eventi raggiungono personale e strumenti definiti (alerting, ticketing).","en":"Event info reaches defined staff and tools (alerting, ticketing)."}},"de_ae_07":{"intro":{"it":"Usare la threat intel per dare senso agli eventi.","en":"Use threat intel to make sense of events."},"no":{"it":"L'analisi non usa alcun contesto o threat intel.","en":"Analysis uses no context or threat intel."},"part":{"it":"Si consulta qualche fonte manualmente, occasionalmente.","en":"Some sources consulted manually, occasionally."},"imp":{"it":"Threat intel e contesto integrati (feed, IoC) nell'analisi degli eventi.","en":"Threat intel and context integrated (feeds, IoCs) into event analysis."}},"de_ae_08":{"intro":{"it":"Avere criteri chiari per dire 'questo è un incidente'.","en":"Have clear criteria to say 'this is an incident'."},"no":{"it":"Nessun criterio; non si sa quando scatta un incidente.","en":"No criteria; you don't know when something becomes an incident."},"part":{"it":"Si decide caso per caso, senza criteri scritti.","en":"Decided case by case, with no written criteria."},"imp":{"it":"Criteri definiti per dichiarare un incidente, applicati in modo coerente.","en":"Defined criteria to declare an incident, applied consistently."}},"rs_ma_01":{"intro":{"it":"Quando scatta un incidente, parte il piano.","en":"When an incident hits, the plan kicks in."},"no":{"it":"Nessun piano; si improvvisa a ogni incidente.","en":"No plan; you improvise each incident."},"part":{"it":"Un piano esiste ma non viene seguito davvero.","en":"A plan exists but isn't really followed."},"imp":{"it":"Il piano viene eseguito (anche coordinando i fornitori) appena dichiarato l'incidente.","en":"The plan is executed (incl. coordinating suppliers) as soon as an incident is declared."}},"rs_ma_02":{"intro":{"it":"Filtrare i veri incidenti dai falsi allarmi.","en":"Sort real incidents from false alarms."},"no":{"it":"Le segnalazioni non vengono filtrate né validate.","en":"Reports aren't triaged or validated."},"part":{"it":"Si reagisce a tutto allo stesso modo, senza priorità.","en":"Everything is reacted to equally, with no priority."},"imp":{"it":"Le segnalazioni sono validate e classificate per gravità (triage).","en":"Reports are validated and triaged by severity."}},"rs_ma_03":{"intro":{"it":"Sapere che tipo di incidente è e quanto è urgente.","en":"Know what type of incident it is and how urgent."},"no":{"it":"Nessuna categorizzazione né priorità degli incidenti.","en":"No categorisation or prioritisation of incidents."},"part":{"it":"Categorie informali, priorità non coerenti.","en":"Informal categories, inconsistent priorities."},"imp":{"it":"Incidenti categorizzati e prioritizzati con criteri definiti.","en":"Incidents categorised and prioritised with defined criteria."}},"rs_ma_04":{"intro":{"it":"Far salire l'incidente a chi di dovere quando serve.","en":"Escalate the incident to the right people when needed."},"no":{"it":"Nessun percorso di escalation definito.","en":"No defined escalation path."},"part":{"it":"Si chiama qualcuno ma senza criteri o catena definita.","en":"Someone is called but with no criteria or defined chain."},"imp":{"it":"Percorsi di escalation definiti (chi, quando, come) e applicati.","en":"Defined escalation paths (who, when, how) that are applied."}},"rs_ma_05":{"intro":{"it":"Sapere quando passare dalla risposta al ripristino.","en":"Know when to move from response to recovery."},"no":{"it":"Nessun criterio per decidere quando avviare il ripristino.","en":"No criteria for deciding when to start recovery."},"part":{"it":"Si decide a sensazione, senza criteri.","en":"Decided by gut feel, with no criteria."},"imp":{"it":"Criteri definiti per avviare il ripristino, applicati durante l'incidente.","en":"Defined criteria to start recovery, applied during the incident."}},"rs_an_03":{"intro":{"it":"Capire come è successo, non solo che è successo.","en":"Understand how it happened, not just that it happened."},"no":{"it":"Non si indaga mai la causa; gli incidenti si ripetono.","en":"Root cause is never investigated; incidents recur."},"part":{"it":"Si rimedia al sintomo senza trovare la causa.","en":"The symptom is fixed without finding the cause."},"imp":{"it":"Analisi della causa radice di ogni incidente rilevante.","en":"Root-cause analysis for every significant incident."}},"rs_an_06":{"intro":{"it":"Tenere traccia di cosa si fa durante l'indagine (catena di custodia).","en":"Track what you do during investigation (chain of custody)."},"no":{"it":"Nessuna registrazione delle azioni svolte.","en":"No record of actions taken."},"part":{"it":"Appunti sparsi, senza garanzie di integrità.","en":"Scattered notes, no integrity guarantees."},"imp":{"it":"Azioni registrate con integrità e provenienza preservate (utile anche in giudizio).","en":"Actions recorded with preserved integrity and provenance (useful even in court)."}},"rs_an_07":{"intro":{"it":"Raccogliere le prove (log, immagini disco) in modo affidabile.","en":"Collect evidence (logs, disk images) reliably."},"no":{"it":"Le evidenze non vengono raccolte o vanno perse.","en":"Evidence isn't collected or is lost."},"part":{"it":"Si raccoglie qualcosa ma senza preservarne l'integrità.","en":"Some collection but integrity isn't preserved."},"imp":{"it":"Dati ed evidenze raccolti e conservati con integrità e provenienza.","en":"Data and evidence collected and kept with integrity and provenance."}},"rs_an_08":{"intro":{"it":"Capire quanto è grande l'incidente (quanti dati e sistemi).","en":"Understand how big the incident is (how much data and systems)."},"no":{"it":"Non si stima mai l'entità dell'incidente.","en":"Magnitude is never estimated."},"part":{"it":"Stima approssimativa non validata.","en":"A rough, unvalidated estimate."},"imp":{"it":"Entità dell'incidente stimata e validata (dati, sistemi, utenti).","en":"Incident magnitude estimated and validated (data, systems, users)."}},"rs_co_02":{"intro":{"it":"Avvisare chi deve sapere (anche autorità e clienti).","en":"Notify those who must know (incl. authorities and customers)."},"no":{"it":"Nessuna notifica; gli incidenti restano nascosti.","en":"No notification; incidents stay hidden."},"part":{"it":"Si avvisa internamente ma senza criteri per autorità o clienti.","en":"Internal notice only, with no criteria for authorities or customers."},"imp":{"it":"Notifica a stakeholder interni ed esterni secondo criteri e tempi (es. autorità).","en":"Notification to internal and external stakeholders per criteria and timelines (e.g. authorities)."}},"rs_co_03":{"intro":{"it":"Condividere info utili con i soggetti giusti durante l'incidente.","en":"Share useful info with the right parties during the incident."},"no":{"it":"Nessuna condivisione di informazioni durante gli incidenti.","en":"No information sharing during incidents."},"part":{"it":"Condivisione informale e incoerente.","en":"Informal, inconsistent sharing."},"imp":{"it":"Condivisione strutturata con stakeholder designati (e community di settore).","en":"Structured sharing with designated stakeholders (and sector communities)."}},"rs_mi_01":{"intro":{"it":"Fermare l'incidente prima che si espanda.","en":"Stop the incident before it spreads."},"no":{"it":"Nessuna capacità di contenimento; l'incidente dilaga.","en":"No containment capability; the incident spreads."},"part":{"it":"Contenimento improvvisato (spegnere un PC) senza procedura.","en":"Improvised containment (unplug a PC) with no procedure."},"imp":{"it":"Procedure di contenimento (isolamento rete, account, sistemi) pronte e provate.","en":"Containment procedures (isolate network, accounts, systems) ready and tested."}},"rs_mi_02":{"intro":{"it":"Rimuovere completamente la minaccia dai sistemi.","en":"Fully remove the threat from systems."},"no":{"it":"La minaccia resta nei sistemi dopo l'incidente.","en":"The threat remains in systems after the incident."},"part":{"it":"Si rimuove il sintomo ma non si verifica la pulizia.","en":"The symptom is removed but cleanup isn't verified."},"imp":{"it":"Eradicazione verificata (rimozione malware/accessi, ripristino integrità).","en":"Verified eradication (malware/access removal, integrity restoration)."}},"rc_rp_01":{"intro":{"it":"Far partire il ripristino in modo ordinato.","en":"Start recovery in an orderly way."},"no":{"it":"Nessun piano di ripristino; recupero caotico.","en":"No recovery plan; chaotic recovery."},"part":{"it":"Un piano esiste ma non viene seguito.","en":"A plan exists but isn't followed."},"imp":{"it":"Il piano di ripristino viene eseguito quando avviato dal processo di risposta.","en":"The recovery plan is executed when triggered by the response process."}},"rc_rp_02":{"intro":{"it":"Decidere cosa ripristinare prima e farlo.","en":"Decide what to restore first and do it."},"no":{"it":"Si ripristina a caso, senza priorità.","en":"Restoration is random, with no priorities."},"part":{"it":"Si ripristina ciò che capita, senza ordine definito.","en":"You restore whatever, with no defined order."},"imp":{"it":"Azioni di ripristino scelte, prioritizzate (servizi critici prima) ed eseguite.","en":"Recovery actions chosen, prioritised (critical services first) and performed."}},"rc_rp_03":{"intro":{"it":"Controllare che i backup siano puliti prima di ripristinarli.","en":"Check backups are clean before restoring."},"no":{"it":"Si ripristina dai backup senza verificarli.","en":"You restore from backups without checking them."},"part":{"it":"Si controlla che il backup esista ma non che sia integro o pulito.","en":"You check the backup exists but not that it's intact or clean."},"imp":{"it":"Integrità dei backup verificata (scansione IoC/corruzione) prima del ripristino.","en":"Backup integrity verified (IoC/corruption scan) before restoration."}},"rc_rp_04":{"intro":{"it":"Decidere come operare in sicurezza subito dopo l'incidente.","en":"Decide how to operate safely right after the incident."},"no":{"it":"Si torna 'come prima' senza valutazioni.","en":"You go back to 'business as usual' with no assessment."},"part":{"it":"Ripristino tecnico senza ridefinire le norme operative.","en":"Technical recovery without redefining operating norms."},"imp":{"it":"Norme operative post-incidente definite considerando funzioni critiche e rischio.","en":"Post-incident operating norms defined considering critical functions and risk."}},"rc_rp_05":{"intro":{"it":"Verificare che tutto sia tornato davvero a posto.","en":"Verify everything truly came back to normal."},"no":{"it":"Si dà per scontato che il ripristino sia riuscito.","en":"Recovery success is assumed."},"part":{"it":"Si rimette in funzione senza verificare integrità o normalità.","en":"Systems brought back up without verifying integrity or normality."},"imp":{"it":"Integrità verificata e ritorno al normale stato operativo confermato.","en":"Integrity verified and return to normal operating status confirmed."}},"rc_rp_06":{"intro":{"it":"Dichiarare ufficialmente chiuso l'incidente e documentarlo.","en":"Officially close the incident and document it."},"no":{"it":"Gli incidenti non vengono mai 'chiusi' formalmente né documentati.","en":"Incidents are never formally 'closed' or documented."},"part":{"it":"Si chiude di fatto ma senza criteri né documentazione completa.","en":"Effectively closed but with no criteria or complete documentation."},"imp":{"it":"Chiusura dichiarata su criteri e documentazione dell'incidente completata.","en":"Closure declared on criteria and incident documentation completed."}},"rc_co_03":{"intro":{"it":"Tenere informati i soggetti giusti durante il ripristino.","en":"Keep the right parties informed during recovery."},"no":{"it":"Nessuna comunicazione durante il ripristino.","en":"No communication during recovery."},"part":{"it":"Aggiornamenti informali e sporadici.","en":"Informal, sporadic updates."},"imp":{"it":"Avanzamento del ripristino comunicato regolarmente agli stakeholder designati.","en":"Recovery progress communicated regularly to designated stakeholders."}},"rc_co_04":{"intro":{"it":"Gestire la comunicazione pubblica (clienti, stampa) in modo approvato.","en":"Manage public communication (customers, press) in an approved way."},"no":{"it":"Nessuna gestione della comunicazione pubblica; messaggi improvvisati.","en":"No management of public communication; improvised messaging."},"part":{"it":"Si comunica al pubblico ma senza messaggi o canali approvati.","en":"Public communication happens but with no approved messaging or channels."},"imp":{"it":"Comunicazioni pubbliche con messaggi e canali approvati (e portavoce designati).","en":"Public updates via approved messaging and channels (and designated spokespeople)."}},"pr_aa_01":{"intro":{"it":"Sapere chi e cosa ha un'identità e gestirne le credenziali.","en":"Know who/what has an identity and manage their credentials."},"no":{"it":"Account condivisi, credenziali non gestite, password ovunque.","en":"Shared accounts, unmanaged credentials, passwords everywhere."},"part":{"it":"Account per utente ma credenziali non gestite centralmente.","en":"Per-user accounts but credentials not centrally managed."},"imp":{"it":"Identità e credenziali gestite centralmente (directory/IdP) per utenti, servizi e dispositivi.","en":"Identities and credentials centrally managed (directory/IdP) for users, services and devices."}},"pr_aa_02":{"intro":{"it":"Assicurarsi che chi riceve un account sia davvero chi dice di essere.","en":"Make sure whoever gets an account is who they claim to be."},"no":{"it":"Account creati senza verificare l'identità della persona.","en":"Accounts created without verifying the person's identity."},"part":{"it":"Verifica informale (es. richiesta via email) senza criteri.","en":"Informal verification (e.g. an email request) with no criteria."},"imp":{"it":"Proofing dell'identità proporzionato al rischio prima di assegnare le credenziali.","en":"Identity proofing proportionate to risk before issuing credentials."}},"pr_aa_03":{"intro":{"it":"Verificare l'identità a ogni accesso (con MFA dove serve).","en":"Verify identity at every login (with MFA where it matters)."},"no":{"it":"Niente autenticazione forte; password deboli, nessuna MFA.","en":"No strong authentication; weak passwords, no MFA."},"part":{"it":"MFA solo su alcuni servizi (es. email), non su VPN/admin.","en":"MFA only on some services (e.g. email), not on VPN/admin."},"imp":{"it":"Autenticazione forte (MFA resistente al phishing dove possibile) su accessi critici e remoti.","en":"Strong authentication (phishing-resistant MFA where possible) on critical and remote access."}},"pr_aa_04":{"intro":{"it":"Proteggere i 'token' di identità (SSO, federazione).","en":"Protect identity tokens (SSO, federation)."},"no":{"it":"SSO/federazione assenti o non protetti; token in chiaro.","en":"SSO/federation absent or unprotected; tokens in the clear."},"part":{"it":"SSO presente ma senza controlli su scadenza e verifica delle asserzioni.","en":"SSO in place but no controls on assertion expiry and verification."},"imp":{"it":"Asserzioni di identità firmate, cifrate, con scadenza e verificate.","en":"Identity assertions signed, encrypted, time-limited and verified."}},"pr_aa_05":{"intro":{"it":"Dare a ciascuno solo gli accessi che servono, e rivederli.","en":"Give everyone only the access they need, and review it."},"no":{"it":"Tutti amministratori; nessuna revisione degli accessi.","en":"Everyone an admin; no access reviews."},"part":{"it":"Permessi per ruolo ma senza revisioni periodiche né separazione dei compiti.","en":"Role-based permissions but no periodic reviews or separation of duties."},"imp":{"it":"Privilegio minimo applicato, separazione dei compiti, revisioni periodiche.","en":"Least privilege enforced, separation of duties, periodic access reviews."}},"pr_aa_06":{"intro":{"it":"Controllare chi entra fisicamente dove ci sono i sistemi.","en":"Control who physically enters where systems live."},"no":{"it":"Server e locali tecnici accessibili a chiunque.","en":"Servers and technical rooms accessible to anyone."},"part":{"it":"Porta chiusa a chiave ma nessun registro o monitoraggio degli accessi.","en":"A locked door but no access log or monitoring."},"imp":{"it":"Accesso fisico controllato (badge), monitorato e proporzionato al rischio.","en":"Physical access controlled (badges), monitored and proportionate to risk."}},"pr_at_01":{"intro":{"it":"Tutti sanno le basi (phishing, password, segnalazioni).","en":"Everyone knows the basics (phishing, passwords, reporting)."},"no":{"it":"Nessuna formazione di sicurezza per il personale.","en":"No security awareness for staff."},"part":{"it":"Formazione una tantum o solo all'assunzione.","en":"One-off or onboarding-only training."},"imp":{"it":"Sensibilizzazione ricorrente con simulazioni (es. phishing) e verifica.","en":"Recurring awareness with simulations (e.g. phishing) and checks."}},"pr_at_02":{"intro":{"it":"Chi ha ruoli tecnici o sensibili riceve formazione mirata.","en":"Those in technical/sensitive roles get targeted training."},"no":{"it":"Sviluppatori, admin e privilegiati non hanno formazione mirata.","en":"Developers, admins and privileged users get no targeted training."},"part":{"it":"Qualche formazione tecnica occasionale, non per ruolo.","en":"Some occasional technical training, not role-specific."},"imp":{"it":"Formazione per ruolo (sviluppo sicuro, amministrazione, gestione dati) periodica.","en":"Periodic role-based training (secure dev, administration, data handling)."}},"pr_ds_01":{"intro":{"it":"Proteggere i dati archiviati (dischi, database, backup).","en":"Protect stored data (disks, databases, backups)."},"no":{"it":"Dati a riposo in chiaro, dischi e portatili non cifrati.","en":"Data at rest in the clear, disks and laptops not encrypted."},"part":{"it":"Cifratura solo su alcuni sistemi, non su portatili o backup.","en":"Encryption only on some systems, not laptops or backups."},"imp":{"it":"Cifratura a riposo su sistemi, portatili e backup, con gestione delle chiavi.","en":"Encryption at rest on systems, laptops and backups, with key management."}},"pr_ds_02":{"intro":{"it":"Cifrare i dati mentre viaggiano in rete.","en":"Encrypt data while it travels the network."},"no":{"it":"Protocolli in chiaro (HTTP, FTP), siti senza HTTPS.","en":"Cleartext protocols (HTTP, FTP), sites without HTTPS."},"part":{"it":"HTTPS sul sito ma altri canali (interni, email, trasferimenti) in chiaro.","en":"HTTPS on the website but other channels (internal, email, transfers) in the clear."},"imp":{"it":"TLS/cifratura su tutti i canali rilevanti, interni ed esterni.","en":"TLS/encryption on all relevant channels, internal and external."}},"pr_ds_10":{"intro":{"it":"Proteggere i dati mentre vengono elaborati o visualizzati.","en":"Protect data while it's processed or viewed."},"no":{"it":"Nessuna attenzione ai dati in uso (schermi a vista, memoria non protetta).","en":"No attention to data in use (screens on view, unprotected memory)."},"part":{"it":"Qualche accorgimento (blocco schermo) ma niente di sistematico.","en":"Some measures (screen lock) but nothing systematic."},"imp":{"it":"Misure tecniche e organizzative (blocco sessioni, privacy screen, gestione memoria) per i dati in uso.","en":"Technical and organisational measures (session locks, privacy screens, memory handling) for data in use."}},"pr_ds_11":{"intro":{"it":"Avere backup affidabili e provati.","en":"Have reliable, tested backups."},"no":{"it":"Nessun backup, o mai verificato.","en":"No backups, or never verified."},"part":{"it":"Backup esistenti ma non protetti (modificabili) né testati.","en":"Backups exist but aren't protected (mutable) or tested."},"imp":{"it":"Backup regolari, protetti (copia offline/immutabile) e ripristino testato.","en":"Regular backups, protected (offline/immutable copy) and tested restore."}},"pr_ps_01":{"intro":{"it":"Configurazioni sicure e standard (hardening), non quelle di default.","en":"Secure, standard configurations (hardening), not defaults."},"no":{"it":"Sistemi con configurazioni di default, nessun baseline.","en":"Systems with default configs, no baseline."},"part":{"it":"Qualche hardening manuale ma senza baseline o controllo delle modifiche.","en":"Some manual hardening but no baseline or change control."},"imp":{"it":"Baseline di configurazione sicure applicate e gestite (change management).","en":"Secure configuration baselines applied and managed (change control)."}},"pr_ps_02":{"intro":{"it":"Tenere il software aggiornato e togliere quello obsoleto.","en":"Keep software patched and remove obsolete software."},"no":{"it":"Software non aggiornato; in uso versioni a fine vita.","en":"Unpatched software; end-of-life versions in use."},"part":{"it":"Patch sui server ma non su tutto; software obsoleto ancora presente.","en":"Servers patched but not everything; obsolete software still around."},"imp":{"it":"Patch management con tempi per gravità; software a fine vita sostituito o rimosso.","en":"Patch management with timelines by severity; end-of-life software replaced or removed."}},"pr_ps_03":{"intro":{"it":"Sostituire l'hardware obsoleto e dismetterlo in sicurezza.","en":"Replace aging hardware and retire it securely."},"no":{"it":"Hardware obsoleto/non supportato in uso; dismissione senza wipe.","en":"Obsolete/unsupported hardware in use; disposal without wiping."},"part":{"it":"Si sostituisce quando si rompe, senza pianificazione o wipe sicuro.","en":"Replaced when it breaks, with no planning or secure wipe."},"imp":{"it":"Manutenzione e rinnovo hardware pianificati; dismissione con cancellazione sicura.","en":"Planned hardware maintenance and refresh; disposal with secure wiping."}},"pr_ps_04":{"intro":{"it":"Produrre log utili e raccoglierli dove servono.","en":"Produce useful logs and collect them where needed."},"no":{"it":"Logging assente o disabilitato; nessuna raccolta.","en":"Logging absent or disabled; no collection."},"part":{"it":"I sistemi loggano localmente ma i log non sono centralizzati.","en":"Systems log locally but logs aren't centralised."},"imp":{"it":"Log generati su sistemi e applicazioni e centralizzati per il monitoraggio.","en":"Logs generated across systems and apps and centralised for monitoring."}},"pr_ps_05":{"intro":{"it":"Impedire l'esecuzione di software non approvato.","en":"Stop unapproved software from running."},"no":{"it":"Gli utenti installano qualsiasi cosa; nessun controllo.","en":"Users install anything; no controls."},"part":{"it":"Si scoraggia ma senza controlli tecnici (no allowlisting).","en":"Discouraged but no technical controls (no allowlisting)."},"imp":{"it":"Allowlisting / controllo applicazioni e privilegi limitati per impedire software non autorizzato.","en":"Allowlisting / application control and limited privileges to prevent unauthorized software."}},"pr_ps_06":{"intro":{"it":"Se sviluppi software, fallo in modo sicuro (per chi sviluppa).","en":"If you build software, build it securely (for those who develop)."},"no":{"it":"Sviluppo senza alcuna pratica di sicurezza (no review, no test).","en":"Development with no security practices (no review, no testing)."},"part":{"it":"Qualche controllo (code review) ma non integrato nel ciclo di sviluppo.","en":"Some checks (code review) but not integrated into the SDLC."},"imp":{"it":"Pratiche di secure SDLC integrate (review, SAST/DAST, gestione dipendenze) e monitorate.","en":"Secure-SDLC practices integrated (review, SAST/DAST, dependency management) and monitored."}},"pr_ir_01":{"intro":{"it":"Segmentare e proteggere la rete da accessi non autorizzati.","en":"Segment and protect the network from unauthorized access."},"no":{"it":"Rete piatta, nessun firewall interno, accessi non controllati.","en":"Flat network, no internal firewalls, uncontrolled access."},"part":{"it":"Firewall perimetrale ma rete interna piatta, poca segmentazione.","en":"A perimeter firewall but a flat internal network, little segmentation."},"imp":{"it":"Segmentazione, controllo degli accessi di rete e protezione degli ambienti (es. zero trust).","en":"Segmentation, network access control and environment protection (e.g. zero trust)."}},"pr_ir_02":{"intro":{"it":"Proteggere i sistemi da incendio, allagamento, alimentazione e clima.","en":"Protect systems from fire, flood, power and climate."},"no":{"it":"Nessuna protezione ambientale dei locali tecnici.","en":"No environmental protection of technical rooms."},"part":{"it":"Qualche misura (UPS) ma niente antincendio o climatizzazione adeguati.","en":"Some measures (UPS) but no adequate fire suppression or cooling."},"imp":{"it":"Protezioni ambientali adeguate (UPS, antincendio, climatizzazione, monitoraggio).","en":"Adequate environmental protections (UPS, fire suppression, cooling, monitoring)."}},"pr_ir_03":{"intro":{"it":"Progettare i sistemi per resistere e continuare a funzionare.","en":"Design systems to withstand and keep running."},"no":{"it":"Nessuna ridondanza; un guasto ferma tutto.","en":"No redundancy; a single failure stops everything."},"part":{"it":"Ridondanza su alcuni sistemi ma nessun requisito di resilienza definito.","en":"Redundancy on some systems but no defined resilience requirements."},"imp":{"it":"Requisiti di resilienza definiti e meccanismi (ridondanza, failover) implementati e provati.","en":"Defined resilience requirements with mechanisms (redundancy, failover) implemented and tested."}},"pr_ir_04":{"intro":{"it":"Avere risorse sufficienti (CPU, storage, banda) per reggere il carico.","en":"Have enough resources (CPU, storage, bandwidth) to handle load."},"no":{"it":"Nessun monitoraggio della capacità; saturazioni improvvise.","en":"No capacity monitoring; sudden saturation."},"part":{"it":"Si reagisce quando lo spazio finisce, senza pianificazione.","en":"You react when space runs out, with no planning."},"imp":{"it":"Capacità monitorata e pianificata per garantire la disponibilità.","en":"Capacity monitored and planned to ensure availability."}},"id_am_01":{"intro":{"it":"Sapere quali dispositivi hai.","en":"Know which devices you have."},"no":{"it":"Nessun inventario hardware; non sai quanti o quali dispositivi hai.","en":"No hardware inventory; you don't know how many or which devices you have."},"part":{"it":"Un elenco parziale o vecchio (es. un foglio Excel non aggiornato).","en":"A partial or outdated list (e.g. a stale spreadsheet)."},"imp":{"it":"Inventario hardware completo e aggiornato (idealmente automatico).","en":"A complete, up-to-date hardware inventory (ideally automated)."}},"id_am_02":{"intro":{"it":"Sapere quali software e servizi giri.","en":"Know what software and services you run."},"no":{"it":"Nessun elenco di software/servizi installati.","en":"No list of installed software/services."},"part":{"it":"Conosci le applicazioni principali ma non tutto (shadow IT, SaaS sparsi).","en":"You know the main apps but not everything (shadow IT, scattered SaaS)."},"imp":{"it":"Inventario di software, servizi e sistemi mantenuto e aggiornato.","en":"A maintained, up-to-date inventory of software, services and systems."}},"id_am_03":{"intro":{"it":"Sapere come i dati si muovono dentro e fuori la rete.","en":"Know how data moves in and out of your network."},"no":{"it":"Nessuna mappa di rete o dei flussi di dati.","en":"No network map or data-flow diagram."},"part":{"it":"Uno schema di rete vecchio, senza i flussi di dati.","en":"An old network diagram, without data flows."},"imp":{"it":"Diagrammi di rete e flussi dati mantenuti e aggiornati.","en":"Maintained, current network and data-flow diagrams."}},"id_am_04":{"intro":{"it":"Sapere quali servizi esterni usi (cloud, SaaS, MSP).","en":"Know which external services you use (cloud, SaaS, MSP)."},"no":{"it":"Nessun elenco dei servizi forniti da terzi.","en":"No list of third-party-provided services."},"part":{"it":"Conosci i fornitori principali ma non tutti i servizi SaaS in uso.","en":"You know main suppliers but not all SaaS in use."},"imp":{"it":"Inventario dei servizi dei fornitori mantenuto e aggiornato.","en":"A maintained, current inventory of supplier services."}},"id_am_05":{"intro":{"it":"Sapere quali asset contano di più.","en":"Know which assets matter most."},"no":{"it":"Tutti gli asset trattati allo stesso modo; nessuna criticità.","en":"All assets treated the same; no criticality."},"part":{"it":"Idea informale di cosa è critico, non documentata.","en":"An informal sense of what's critical, undocumented."},"imp":{"it":"Asset classificati e prioritizzati per criticità e impatto sulla missione.","en":"Assets classified and prioritised by criticality and mission impact."}},"id_am_07":{"intro":{"it":"Sapere quali dati possiedi e dove sono.","en":"Know what data you hold and where it is."},"no":{"it":"Non sai quali dati hai o dove sono conservati.","en":"You don't know what data you have or where it lives."},"part":{"it":"Conosci i database principali ma non i dati sparsi (file, export, backup).","en":"You know main databases but not scattered data (files, exports, backups)."},"imp":{"it":"Inventario dei dati e metadati mantenuto per le tipologie designate.","en":"A maintained inventory of data and metadata for designated data types."}},"id_am_08":{"intro":{"it":"Gestire gli asset dall'acquisto alla dismissione sicura.","en":"Manage assets from purchase to secure disposal."},"no":{"it":"Nessuna gestione del ciclo di vita; asset dismessi senza cancellazione dati.","en":"No lifecycle management; retired assets disposed without data wiping."},"part":{"it":"Si gestisce l'acquisto ma la dismissione è improvvisata.","en":"Acquisition is handled but disposal is ad hoc."},"imp":{"it":"Ciclo di vita gestito: acquisizione, manutenzione, dismissione sicura (wipe/distruzione).","en":"Managed lifecycle: acquisition, maintenance, secure disposal (wipe/destruction)."}},"id_ra_01":{"intro":{"it":"Trovare e registrare le vulnerabilità prima degli attaccanti.","en":"Find and record vulnerabilities before attackers do."},"no":{"it":"Nessuna scansione delle vulnerabilità.","en":"No vulnerability scanning."},"part":{"it":"Scansioni occasionali, risultati non tracciati né validati.","en":"Occasional scans, results not tracked or validated."},"imp":{"it":"Scansioni periodiche, vulnerabilità validate e registrate per la gestione.","en":"Periodic scans, vulnerabilities validated and recorded for management."}},"id_ra_02":{"intro":{"it":"Essere informati sulle minacce che ti riguardano.","en":"Stay informed about threats relevant to you."},"no":{"it":"Nessuna fonte di threat intelligence.","en":"No threat intelligence sources."},"part":{"it":"Si leggono notizie generiche ma niente di mirato o strutturato.","en":"You read general news but nothing targeted or structured."},"imp":{"it":"Fonti di threat intelligence pertinenti seguite e usate per le decisioni.","en":"Relevant threat-intel sources followed and used in decisions."}},"id_ra_03":{"intro":{"it":"Capire chi o cosa potrebbe colpirti.","en":"Understand who or what could hit you."},"no":{"it":"Nessuna analisi delle minacce.","en":"No threat analysis."},"part":{"it":"Si considerano solo minacce ovvie (es. ransomware) senza registrarle.","en":"Only obvious threats considered (e.g. ransomware), not recorded."},"imp":{"it":"Minacce interne ed esterne identificate e registrate sistematicamente.","en":"Internal and external threats systematically identified and recorded."}},"id_ra_04":{"intro":{"it":"Stimare 'quanto è probabile' e 'quanto fa male'.","en":"Estimate 'how likely' and 'how bad'."},"no":{"it":"Non si valutano impatto e probabilità.","en":"Impact and likelihood aren't assessed."},"part":{"it":"Valutazione solo qualitativa e occasionale.","en":"Only qualitative, occasional assessment."},"imp":{"it":"Impatti e probabilità stimati e registrati per i rischi rilevanti.","en":"Impacts and likelihoods estimated and recorded for relevant risks."}},"id_ra_05":{"intro":{"it":"Mettere insieme i pezzi per decidere cosa affrontare prima.","en":"Combine the pieces to decide what to tackle first."},"no":{"it":"I dati di rischio non vengono usati per stabilire priorità.","en":"Risk data isn't used to set priorities."},"part":{"it":"Si stila una lista ma senza priorità coerenti.","en":"A list is made but with no consistent priorities."},"imp":{"it":"Il rischio inerente è calcolato e usato per prioritizzare le risposte.","en":"Inherent risk is calculated and used to prioritise responses."}},"id_ra_06":{"intro":{"it":"Decidere e seguire cosa fare per ogni rischio.","en":"Decide and follow through on each risk."},"no":{"it":"I rischi identificati restano senza azione.","en":"Identified risks sit with no action."},"part":{"it":"Si decide cosa fare ma non si traccia l'avanzamento.","en":"Decisions are made but progress isn't tracked."},"imp":{"it":"Risposte scelte, pianificate, tracciate fino a chiusura e comunicate.","en":"Responses chosen, planned, tracked to closure and communicated."}},"id_ra_07":{"intro":{"it":"Valutare il rischio prima di cambiare le cose o concedere eccezioni.","en":"Assess risk before changing things or granting exceptions."},"no":{"it":"Modifiche ed eccezioni senza valutazione del rischio.","en":"Changes and exceptions with no risk assessment."},"part":{"it":"Change management informale, eccezioni non registrate.","en":"Informal change management, exceptions not recorded."},"imp":{"it":"Change management con valutazione del rischio; eccezioni registrate e tracciate.","en":"Change management with risk assessment; exceptions recorded and tracked."}},"id_ra_08":{"intro":{"it":"Avere un modo per ricevere segnalazioni di bug di sicurezza.","en":"Have a way to receive security bug reports."},"no":{"it":"Nessun canale per segnalare vulnerabilità (es. security.txt).","en":"No channel to report vulnerabilities (e.g. security.txt)."},"part":{"it":"Si reagisce alle segnalazioni ma senza un processo definito.","en":"Reports are handled but with no defined process."},"imp":{"it":"Processo di vulnerability disclosure definito (canale, analisi, risposta).","en":"A defined vulnerability disclosure process (channel, analysis, response)."}},"id_ra_09":{"intro":{"it":"Verificare che ciò che installi sia autentico e integro.","en":"Verify what you install is genuine and untampered."},"no":{"it":"Si installa software/hardware senza verificarne origine o integrità.","en":"Software/hardware is installed without checking source or integrity."},"part":{"it":"Si scarica solo da fonti note ma senza verifiche (firme/hash).","en":"Downloaded only from known sources but without checks (signatures/hashes)."},"imp":{"it":"Autenticità e integrità verificate (firme, hash, fornitori fidati) prima dell'uso.","en":"Authenticity and integrity verified (signatures, hashes, trusted vendors) before use."}},"id_ra_10":{"intro":{"it":"Valutare la sicurezza dei fornitori critici prima di comprare.","en":"Assess critical suppliers' security before buying."},"no":{"it":"Nessuna valutazione di sicurezza dei fornitori prima dell'acquisto.","en":"No security assessment of suppliers before purchase."},"part":{"it":"Valutazione solo per i contratti più grandi, informale.","en":"Assessment only for the biggest deals, informal."},"imp":{"it":"Fornitori critici valutati (questionari, certificazioni) prima dell'acquisizione.","en":"Critical suppliers assessed (questionnaires, certifications) before acquisition."}},"id_im_01":{"intro":{"it":"Usare audit e assessment per migliorare.","en":"Use audits and assessments to improve."},"no":{"it":"Le valutazioni, se ci sono, non producono miglioramenti.","en":"Evaluations, if any, lead to no improvements."},"part":{"it":"Si fanno valutazioni ma i rilievi non sono seguiti.","en":"Evaluations happen but findings aren't followed up."},"imp":{"it":"I rilievi delle valutazioni diventano azioni di miglioramento tracciate.","en":"Evaluation findings become tracked improvement actions."}},"id_im_02":{"intro":{"it":"Imparare da pentest, simulazioni e tabletop.","en":"Learn from pentests, simulations and tabletop exercises."},"no":{"it":"Nessun test o esercitazione di sicurezza.","en":"No security tests or exercises."},"part":{"it":"Qualche pentest ma senza esercitazioni o follow-up.","en":"Some pentests but no exercises or follow-up."},"imp":{"it":"Test ed esercitazioni periodici (anche con terze parti) che generano miglioramenti.","en":"Periodic tests and exercises (incl. third parties) that drive improvements."}},"id_im_03":{"intro":{"it":"Migliorare grazie a ciò che emerge nel lavoro quotidiano.","en":"Improve from what daily operations reveal."},"no":{"it":"I problemi operativi ricorrenti non portano a miglioramenti.","en":"Recurring operational issues lead to no improvements."},"part":{"it":"Si notano problemi ma non si formalizzano azioni.","en":"Issues are noticed but no actions are formalised."},"imp":{"it":"I segnali dall'operatività alimentano un processo di miglioramento continuo.","en":"Operational signals feed a continuous improvement process."}},"id_im_04":{"intro":{"it":"Avere piani (incidenti, continuità) vivi e migliorati.","en":"Have living, improving plans (incident, continuity)."},"no":{"it":"Nessun piano di risposta agli incidenti.","en":"No incident response plan."},"part":{"it":"Un piano esiste ma non è comunicato né aggiornato.","en":"A plan exists but isn't communicated or updated."},"imp":{"it":"Piani stabiliti, comunicati, mantenuti e migliorati dopo test e incidenti.","en":"Plans established, communicated, maintained and improved after tests and incidents."}},"gv_oc_01":{"intro":{"it":"Collegare la sicurezza a cosa fa davvero l'azienda.","en":"Tie security to what the business actually does."},"no":{"it":"La sicurezza è scollegata dalla missione; nessuno sa quali processi proteggere per primi.","en":"Security is disconnected from the mission; no one knows which processes to protect first."},"part":{"it":"Si intuisce cosa è importante ma non è scritto né usato per dare priorità.","en":"There's a sense of what matters but it isn't written or used to prioritise."},"imp":{"it":"Missione e processi critici documentati e usati per dare priorità al rischio cyber.","en":"Mission and critical processes documented and used to prioritise cyber risk."}},"gv_oc_02":{"intro":{"it":"Sapere chi ha aspettative su di te (clienti, soci, autorità) e quali.","en":"Know who expects what from you (customers, owners, regulators)."},"no":{"it":"Nessuna mappatura di stakeholder e aspettative.","en":"No mapping of stakeholders and expectations."},"part":{"it":"Conosci i clienti principali ma non hai considerato autorità, partner, dipendenti.","en":"You know key customers but haven't considered regulators, partners, employees."},"imp":{"it":"Stakeholder e relative aspettative cyber identificati e considerati nelle decisioni.","en":"Stakeholders and their cyber expectations identified and considered in decisions."}},"gv_oc_03":{"intro":{"it":"Sapere a quali leggi/contratti devi rispondere (GDPR, NIS2, clausole clienti).","en":"Know which laws/contracts you must meet (GDPR, NIS2, customer clauses)."},"no":{"it":"Obblighi legali/contrattuali non identificati.","en":"Legal/contractual obligations not identified."},"part":{"it":"Conosci il GDPR ma non hai mappato NIS2, clausole contrattuali o requisiti di settore.","en":"You know GDPR but haven't mapped NIS2, contractual clauses or sector requirements."},"imp":{"it":"Registro degli obblighi (legali, contrattuali, privacy) mantenuto e gestito.","en":"A maintained, actively managed register of obligations (legal, contractual, privacy)."}},"gv_oc_04":{"intro":{"it":"Sapere cosa gli altri si aspettano che tu garantisca.","en":"Know what others expect you to keep running."},"no":{"it":"Non è chiaro quali servizi critici devi garantire agli altri.","en":"It's unclear which critical services you must guarantee to others."},"part":{"it":"Lista informale dei servizi chiave, non comunicata.","en":"An informal list of key services, not communicated."},"imp":{"it":"Servizi e capacità critiche attese documentati e comunicati.","en":"Critical expected services and capabilities documented and communicated."}},"gv_oc_05":{"intro":{"it":"Sapere da chi e da cosa dipendi (fornitori, cloud, utenze).","en":"Know what you depend on (suppliers, cloud, utilities)."},"no":{"it":"Dipendenze critiche esterne non mappate.","en":"Critical external dependencies not mapped."},"part":{"it":"Conosci i fornitori IT principali ma non le dipendenze indirette o di filiera.","en":"You know main IT suppliers but not indirect or supply-chain dependencies."},"imp":{"it":"Dipendenze critiche identificate, documentate e comunicate.","en":"Critical dependencies identified, documented and communicated."}},"gv_rm_01":{"intro":{"it":"Definire cosa vuoi ottenere gestendo il rischio.","en":"Define what you want risk management to achieve."},"no":{"it":"Nessun obiettivo di gestione del rischio.","en":"No risk-management objectives."},"part":{"it":"Obiettivi generici non concordati con i vertici.","en":"Generic objectives, not agreed with leadership."},"imp":{"it":"Obiettivi di rischio definiti e approvati dagli stakeholder.","en":"Risk objectives defined and agreed by stakeholders."}},"gv_rm_02":{"intro":{"it":"Dire esplicitamente quanto rischio accetti.","en":"State explicitly how much risk you accept."},"no":{"it":"Nessuna soglia di rischio definita.","en":"No defined risk threshold."},"part":{"it":"Idea implicita del rischio accettabile, mai scritta né comunicata.","en":"An implicit sense of acceptable risk, never written or communicated."},"imp":{"it":"Propensione e tolleranza al rischio dichiarate, comunicate e aggiornate.","en":"Risk appetite and tolerance stated, communicated and kept current."}},"gv_rm_03":{"intro":{"it":"Trattare il rischio cyber come gli altri rischi d'impresa.","en":"Treat cyber risk like other business risks."},"no":{"it":"Il rischio cyber è isolato, non entra nel rischio d'impresa.","en":"Cyber risk is siloed, not part of business risk."},"part":{"it":"Se ne parla in IT ma non arriva al registro rischi aziendale.","en":"Discussed in IT but never reaches the enterprise risk register."},"imp":{"it":"Il rischio cyber è integrato nel processo ERM e nel registro rischi.","en":"Cyber risk is integrated into the ERM process and risk register."}},"gv_rm_04":{"intro":{"it":"Definire come scegli tra accettare, mitigare, trasferire o evitare un rischio.","en":"Define how you choose to accept, mitigate, transfer or avoid a risk."},"no":{"it":"Nessun criterio per decidere come rispondere ai rischi.","en":"No criteria for deciding how to respond to risks."},"part":{"it":"Si decide caso per caso senza criteri condivisi.","en":"Decisions are case by case with no shared criteria."},"imp":{"it":"Criteri di risposta al rischio definiti e comunicati (accettare/mitigare/trasferire/evitare).","en":"Risk-response criteria defined and communicated (accept/mitigate/transfer/avoid)."}},"gv_rm_05":{"intro":{"it":"Sapere a chi e come si segnalano i rischi.","en":"Know to whom and how risks are escalated."},"no":{"it":"Nessun canale per segnalare i rischi cyber.","en":"No channel to raise cyber risks."},"part":{"it":"Comunicazione informale, niente per i rischi di fornitori/terze parti.","en":"Informal communication, nothing for supplier/third-party risks."},"imp":{"it":"Linee di comunicazione del rischio definite, anche per fornitori e terze parti.","en":"Defined risk-communication lines, including for suppliers and third parties."}},"gv_rm_06":{"intro":{"it":"Misurare i rischi sempre allo stesso modo, così sono confrontabili.","en":"Measure risks the same way so they're comparable."},"no":{"it":"Nessun metodo; i rischi non sono misurati né confrontabili.","en":"No method; risks aren't measured or comparable."},"part":{"it":"Valutazioni soggettive senza scala o criteri coerenti.","en":"Subjective ratings with no consistent scale or criteria."},"imp":{"it":"Metodo standard (es. probabilità×impatto) per misurare e prioritizzare i rischi.","en":"A standard method (e.g. likelihood×impact) to score and prioritise risks."}},"gv_rm_07":{"intro":{"it":"Considerare anche i 'rischi positivi': dove la sicurezza crea valore.","en":"Also consider positive risks: where security can create value."},"no":{"it":"Si guarda solo al lato negativo del rischio.","en":"Only the downside of risk is considered."},"part":{"it":"Occasionalmente si nota un'opportunità ma non in modo strutturato.","en":"Opportunities are noticed occasionally but not systematically."},"imp":{"it":"Le opportunità (es. sicurezza come vantaggio competitivo) entrano nelle decisioni di rischio.","en":"Opportunities (e.g. security as a competitive edge) feed risk decisions."}},"gv_rr_01":{"intro":{"it":"I vertici ci mettono la faccia sulla sicurezza.","en":"Leadership owns security, visibly."},"no":{"it":"I vertici delegano tutto e non se ne occupano.","en":"Leadership delegates everything and stays out of it."},"part":{"it":"Interesse a parole ma nessuna responsabilità reale assunta.","en":"Verbal interest but no real accountability taken."},"imp":{"it":"La leadership è responsabile, promuove la cultura della sicurezza e ne risponde.","en":"Leadership is accountable, fosters a security culture and answers for it."}},"gv_rr_02":{"intro":{"it":"Ognuno sa cosa deve fare in sicurezza.","en":"Everyone knows their security duties."},"no":{"it":"Nessun ruolo cyber assegnato.","en":"No cyber roles assigned."},"part":{"it":"Ruoli noti informalmente ma non documentati né applicati.","en":"Roles known informally but not documented or enforced."},"imp":{"it":"Ruoli e autorità definiti, comunicati e applicati.","en":"Roles and authorities defined, communicated and enforced."}},"gv_rr_03":{"intro":{"it":"Dare budget, tempo e persone alla sicurezza.","en":"Give security budget, time and people."},"no":{"it":"Nessuna risorsa dedicata alla sicurezza.","en":"No resources dedicated to security."},"part":{"it":"Risorse minime e occasionali, senza budget pianificato.","en":"Minimal, occasional resources with no planned budget."},"imp":{"it":"Budget e risorse pianificati e proporzionati alla strategia di rischio.","en":"Budget and resources planned and proportionate to the risk strategy."}},"gv_rr_04":{"intro":{"it":"Sicurezza dentro il ciclo di vita del dipendente.","en":"Security across the employee lifecycle."},"no":{"it":"HR ignora la sicurezza (no screening, no revoca accessi all'uscita).","en":"HR ignores security (no screening, no access revocation on exit)."},"part":{"it":"Qualche pratica (es. NDA) ma offboarding e formazione non coperti.","en":"Some practices (e.g. NDA) but offboarding and training not covered."},"imp":{"it":"Sicurezza integrata in assunzione, formazione, mobilità e cessazione.","en":"Security built into hiring, training, mobility and termination."}},"gv_po_01":{"intro":{"it":"Avere le regole scritte, basate sul tuo contesto.","en":"Have written rules, based on your context."},"no":{"it":"Nessuna policy.","en":"No policy."},"part":{"it":"Policy scaricata e generica, non comunicata né applicata.","en":"A generic downloaded policy, not communicated or enforced."},"imp":{"it":"Policy basata sul contesto, approvata, comunicata e applicata.","en":"A context-based policy, approved, communicated and enforced."}},"gv_po_02":{"intro":{"it":"Tenere la policy viva, non un documento del 2019.","en":"Keep the policy alive, not a 2019 relic."},"no":{"it":"La policy non viene mai aggiornata.","en":"The policy is never updated."},"part":{"it":"Aggiornata raramente, senza un ciclo definito.","en":"Updated rarely, with no defined cycle."},"imp":{"it":"Revisione periodica e a fronte di cambiamenti, con ricomunicazione.","en":"Periodic and change-driven review, with re-communication."}},"gv_ov_01":{"intro":{"it":"Guardare i risultati e correggere la rotta.","en":"Look at results and adjust course."},"no":{"it":"I risultati non vengono mai rivisti.","en":"Outcomes are never reviewed."},"part":{"it":"Revisione sporadica senza modifiche conseguenti.","en":"Sporadic review with no resulting changes."},"imp":{"it":"I risultati sono rivisti periodicamente e usati per adeguare la strategia.","en":"Outcomes reviewed periodically and used to adjust the strategy."}},"gv_ov_02":{"intro":{"it":"Verificare che la strategia copra davvero tutto ciò che serve.","en":"Check the strategy actually covers what's needed."},"no":{"it":"Nessuna verifica di copertura.","en":"No coverage check."},"part":{"it":"Si assume che copra tutto senza verificarlo.","en":"Assumed to cover everything, without checking."},"imp":{"it":"La strategia è verificata e adeguata per coprire requisiti e rischi.","en":"The strategy is verified and adjusted to cover requirements and risks."}},"gv_ov_03":{"intro":{"it":"Misurare se la sicurezza sta funzionando (metriche, KPI).","en":"Measure whether security is working (metrics, KPIs)."},"no":{"it":"Nessuna metrica; non si sa se funziona.","en":"No metrics; you don't know if it works."},"part":{"it":"Qualche numero raccolto ma non usato per decidere.","en":"Some numbers collected but not used to decide."},"imp":{"it":"KPI/metriche di sicurezza valutati e usati per gli aggiustamenti.","en":"Security KPIs/metrics evaluated and used to drive adjustments."}},"gv_sc_01":{"intro":{"it":"Avere un approccio strutturato al rischio fornitori, non improvvisato.","en":"Have a structured approach to supplier risk, not ad hoc."},"no":{"it":"Nessun programma per il rischio fornitori.","en":"No supplier-risk program."},"part":{"it":"Qualche controllo sui fornitori ma senza un programma definito.","en":"Some supplier checks but no defined program."},"imp":{"it":"Programma di supply chain risk definito, con policy e processi approvati.","en":"A defined supply-chain risk program with approved policies and processes."}},"gv_sc_02":{"intro":{"it":"Sapere chi gestisce il rapporto di sicurezza con ciascun terzo.","en":"Know who owns the security relationship with each third party."},"no":{"it":"Nessuno è responsabile della sicurezza dei rapporti con i terzi.","en":"No one owns third-party security relationships."},"part":{"it":"Responsabilità implicite, non coordinate.","en":"Implicit, uncoordinated responsibilities."},"imp":{"it":"Ruoli verso terze parti definiti e coordinati dentro e fuori l'organizzazione.","en":"Third-party roles defined and coordinated internally and externally."}},"gv_sc_03":{"intro":{"it":"Il rischio fornitori entra nel tuo processo di rischio, non è separato.","e
